apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-fe
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akshatam-DT/gh-cd.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
