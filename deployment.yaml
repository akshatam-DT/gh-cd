apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-fe
spec:
  replicas: 4
  selector:
    matchLabels:
      app: app-fe
  template:
    metadata:
      labels:
        app: app-fe
    spec:
      containers:
        - name: app-fe
          image: aksh76120/app-fe:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 80
