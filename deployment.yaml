apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-fe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-fe
  template:
    metadata:
      labels:
        app: app-fe
    spec:
      containers:
        - name: app-fe
          image: aksh76120/app-fe:f82755fc937bcb03fd6c547c1a47e98b03cb507d
          imagePullPolicy: Always
          ports:
            - containerPort: 80
