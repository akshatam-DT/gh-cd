apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-fe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-fe
  template:
    metadata:
      labels:
        app: app-fe
    spec:
      containers:
        - name: app-fe
          image: aksh76120/app-fe:1919e68f9e073706e336ba5e7c3d0389710e4a01
          imagePullPolicy: Always
          ports:
            - containerPort: 80
