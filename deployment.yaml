apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-fe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-fe
  template:
    metadata:
      labels:
        app: app-fe
    spec:
      containers:
        - name: app-fe
          image: aksh76120/app-fe:99a5223090983520774a3fd9ae371685c5e25bb6
          ports:
            - containerPort: 80
