apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-fe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-fe
  template:
    metadata:
      labels:
        app: app-fe
    spec:
      containers:
        - name: app-fe
          image: aksh76120/app-fe:9342e8dde3221b4c2737c5cea74910de0d5cbc54
          imagePullPolicy: Always
          ports:
            - containerPort: 80
