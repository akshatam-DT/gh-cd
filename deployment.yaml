apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-fe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-fe
  template:
    metadata:
      labels:
        app: app-fe
    spec:
      containers:
        - name: app-fe
          image: aksh76120/app-fe:72c14576bb153f6ad49825d1ec6410247be101cf
          imagePullPolicy: Always
          ports:
            - containerPort: 80
